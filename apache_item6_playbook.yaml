---
- name: INSTALAR Y CONFIGURAR APACHE EN PUERTO 9999
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: ACTUALIZAR CACHE DE APT
      apt:
        update_cache: yes

    - name: INSTALAR APACHE2
      apt:
        name: apache2
        state: present

    - name: CONFIGURAR APACHE PARA ESCUCHAR EN PUERTO 9999
      lineinfile:
        path: /etc/apache2/ports.conf
        regexp: '^Listen 80'
        line: 'Listen 9999'

    - name: CONFIGURAR VIRTUALHOST EN PUERTO 9999
      lineinfile:
        path: /etc/apache2/sites-available/000-default.conf
        regexp: '^<VirtualHost \*:80>'
        line: '<VirtualHost *:9999>'

    - name: REINICIAR APACHE
      service:
        name: apache2
        state: restarted
        enabled: yes
