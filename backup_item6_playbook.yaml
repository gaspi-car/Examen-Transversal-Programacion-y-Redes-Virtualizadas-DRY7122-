---
- name: BACKUP RUNNING-CONFIG - ITEM 6
  hosts: CSR1kv
  gather_facts: false
  connection: local
  tasks:
    - name: OBTENER RUNNING-CONFIG
      ios_command:
        commands:
          - show running-config
      register: config

    - name: GUARDAR BACKUP
      copy:
        content: "{{ config.stdout[0] }}"
        dest: "backups/show_run_{{ inventory_hostname }}_item6.txt"
