---
- name: CONFIGURAR IPv6 EN LOOPBACK33
  hosts: CSR1kv
  gather_facts: false
  connection: local
  tasks:
    - name: CREAR LOOPBACK33 Y ASIGNAR DIRECCIONAMIENTO IPv6
      ios_config:
        parents: "interface Loopback33"
        lines:
          - description Loopback33 - Item 6 IPv6
          - ipv6 enable
          - ipv6 address 3001:ABCD:ABCD:1::1/128
          - ipv6 address FE80::1 link-local

    - name: VERIFICAR INTERFAZ IPv6
      ios_command:
        commands:
          - show ipv6 interface brief
      register: salida_ipv6

    - name: GUARDAR SALIDA EN ARCHIVO
      copy:
        content: "{{ salida_ipv6.stdout[0] }}"
        dest: "ios_configurations/IPv6_Loopback33_{{ inventory_hostname }}.txt"
